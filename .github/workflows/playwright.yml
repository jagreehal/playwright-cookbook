name: Playwright Tests

on:
  # Run on every branch push (pre-PR feedback) and on PRs (covers fork
  # contributions, which push events from forks cannot trigger).
  push:
  pull_request:

# Cancel an in-progress run when new commits land on the same ref, so rapid
# re-pushes don't queue redundant runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate the type-safe i18n setup: a t() key that is not in the locale JSON, or
  # a bad-key directive that stops erroring, fails this check (card 41).
  typecheck:
    name: Typecheck (i18n)
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Typecheck i18n
        run: pnpm typecheck

  # Shard the suite across runners. Each shard emits a blob report; a final job
  # merges the blobs into one HTML report (playwright-ci).
  test:
    name: Test (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    # Same-repo branches are covered by the push event, so skip the duplicate
    # pull_request run. Fork PRs only arrive via pull_request, so still run them.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run tests (shard ${{ matrix.shard }})
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 7

  merge-reports:
    name: Merge reports
    # Run unless cancelled, but skip when the test job was skipped (the
    # duplicate same-repo pull_request run) so we don't try to merge nothing.
    if: ${{ !cancelled() && needs.test.result != 'skipped' }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 14
